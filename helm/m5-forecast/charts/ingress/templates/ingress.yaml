{{- if eq .Values.controller "nginx" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "ingress.apiService" . }}
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ingress.frontendService" . }}
                port:
                  number: 80
{{- else }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-route
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.host }}`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: {{ include "ingress.apiService" . }}
          port: 8000
      middlewares:
        - name: {{ .Release.Name }}-ratelimit
        - name: {{ .Release.Name }}-compress
        - name: {{ .Release.Name }}-headers
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      services:
        - name: {{ include "ingress.frontendService" . }}
          port: 80
      middlewares:
        - name: {{ .Release.Name }}-compress
        - name: {{ .Release.Name }}-headers
{{- end }}