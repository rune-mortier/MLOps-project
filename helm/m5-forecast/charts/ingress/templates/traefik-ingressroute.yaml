{{- if eq .Values.controller "traefik" }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-route
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.host }}`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: {{ include "ingress.apiService" . }}
          port: 8000
      middlewares:
        - name: {{ .Release.Name }}-ratelimit
        - name: {{ .Release.Name }}-compress
        - name: {{ .Release.Name }}-headers
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      services:
        - name: {{ include "ingress.frontendService" . }}
          port: 80
      middlewares:
        - name: {{ .Release.Name }}-compress
        - name: {{ .Release.Name }}-headers
{{- end }}