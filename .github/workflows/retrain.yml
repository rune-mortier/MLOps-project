name: "3.1 · Retrain model on Azure ML"

on:
  push:
    branches: [main]
    paths:
      - "training/**"
      - "environment.yml"
      - "submit_job.py"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  retrain:
    name: Submit Azure ML training job
    runs-on: self-hosted
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Azure ML SDK
        shell: cmd
        run: C:\Users\rumoo\miniconda3\Scripts\pip.exe install azure-ai-ml azure-identity --quiet

      - name: Submit training job
        shell: cmd
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          BLOB_CONN_STR: ${{ secrets.BLOB_CONN_STR }}
        run: C:\Users\rumoo\miniconda3\python.exe submit_job.py

      - name: Copy model artifacts from Azure ML output
        shell: cmd
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: C:\Users\rumoo\miniconda3\python.exe download_artifacts.py
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            outputs/mlp_model.keras
            outputs/lstm_model.keras
            outputs/scaler.pkl
          retention-days: 7

      - name: Trigger redeploy workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'redeploy_model.yml',
              ref: 'main',
              inputs: { triggered_by: 'retrain' }
            })