name: "3.2 · Redeploy model to cluster"

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Wie heeft deze workflow getriggerd?"
        default: "manual"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/m5-api
  HELM_RELEASE: m5
  HELM_CHART: ./helm/m5-forecast
  NAMESPACE: default
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build-and-deploy:
    name: Build API image + Helm upgrade
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Helm upgrade (model redeploy)
        shell: cmd
        run: helm upgrade %HELM_RELEASE% %HELM_CHART% --namespace %NAMESPACE% --reuse-values --set api.image.repository=%IMAGE_API% --set api.image.tag=latest --set api.image.pullPolicy=Always --wait --timeout 5m

      - name: Verify rollout
        shell: cmd
        run: kubectl rollout status deployment/%HELM_RELEASE%-api --namespace %NAMESPACE% --timeout=120s