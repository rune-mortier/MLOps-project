name: "3.2 · Redeploy model to cluster"

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Wie heeft deze workflow getriggerd?"
        default: "manual"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build-and-deploy:
    name: Build API image + Helm upgrade
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rune-mortier/m5-api
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Get image tag
        id: tag
        shell: cmd
        run: echo image_tag=latest >> %GITHUB_OUTPUT%

      - name: Helm upgrade (model redeploy)
        shell: cmd
        env:
          KUBECONFIG: C:\actions-runner\kubeconfig.yml
        run: C:\Users\rumoo\kubectl\helm.exe upgrade m5 ./helm/m5-forecast --namespace ingress --reuse-values --set api.image.repository=ghcr.io/rune-mortier/m5-api --set api.image.tag=latest --set api.image.pullPolicy=Always
      - name: Verify rollout
        shell: cmd
        env:
          KUBECONFIG: C:\actions-runner\kubeconfig.yml
        run: C:\Users\rumoo\kubectl\kubectl.exe rollout status deployment/m5-api --namespace ingress --timeout=120s