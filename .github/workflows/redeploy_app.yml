name: "3.3 · Redeploy frontend / api / config"
 
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "api/**"
      - "helm/**"
      - ".github/workflows/redeploy_app.yml"
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8
 
jobs:
  changes:
    name: Detect changed components
    runs-on: self-hosted
    outputs:
      api:      ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      helm:     ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            frontend:
              - 'frontend/**'
            helm:
              - 'helm/**'

  build-api:
    name: Build & push API image
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rune-mortier/m5-api
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
 
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    name: Build & push frontend image
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rune-mortier/m5-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
 
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    name: Helm upgrade
    needs: [changes, build-api, build-frontend]
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' ||
       needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.helm == 'true')
    runs-on: self-hosted
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Helm upgrade API
        if: needs.changes.outputs.api == 'true'
        shell: cmd
        env:
          KUBECONFIG: C:\actions-runner\kubeconfig.yml
        run: C:\Users\rumoo\kubectl\helm.exe upgrade m5 ./helm/m5-forecast --namespace ingress --reuse-values --set api.image.repository=ghcr.io/rune-mortier/m5-api --set api.image.tag=latest --set api.image.pullPolicy=Always --wait --timeout 10m
 
      - name: Helm upgrade frontend
        if: needs.changes.outputs.frontend == 'true'
        shell: cmd
        env:
          KUBECONFIG: C:\actions-runner\kubeconfig.yml
        run: C:\Users\rumoo\kubectl\helm.exe upgrade m5 ./helm/m5-forecast --namespace ingress --reuse-values --set frontend.image.repository=ghcr.io/rune-mortier/m5-frontend --set frontend.image.tag=latest --set frontend.image.pullPolicy=Always --wait --timeout 10m
 
      - name: Helm upgrade config only
        if: needs.changes.outputs.helm == 'true' && needs.changes.outputs.api != 'true' && needs.changes.outputs.frontend != 'true'
        shell: cmd
        env:
          KUBECONFIG: C:\actions-runner\kubeconfig.yml
        run: C:\Users\rumoo\kubectl\helm.exe upgrade m5 ./helm/m5-forecast --namespace ingress --reuse-values --wait --timeout 10m
 
      - name: Verify API rollout
        if: needs.changes.outputs.api == 'true'
        shell: cmd
        env:
          KUBECONFIG: C:\actions-runner\kubeconfig.yml
        run: C:\Users\rumoo\kubectl\kubectl.exe rollout status deployment/m5-api --namespace ingress --timeout=120s
 
      - name: Verify frontend rollout
        if: needs.changes.outputs.frontend == 'true'
        shell: cmd
        env:
          KUBECONFIG: C:\actions-runner\kubeconfig.yml
        run: C:\Users\rumoo\kubectl\kubectl.exe rollout status deployment/m5-frontend --namespace ingress --timeout=120s